<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ball Lines · WuPinYi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #18181c;
      --surface2: #222226;
      --text: #f0f0f2;
      --text-dim: #888;
      --gold: #ffcc33;
      --orange: #ff9500;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* CENTERED PAGE WRAPPER */
    .page {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    /* HEADER */
    .header {
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 14px 16px 10px;
    }

    .back-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--text); }

    .hud {
      display: flex;
      align-items: flex-end;
      gap: 18px;
    }

    .next-block, .score-block { text-align: right; }

    .lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .score-val {
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      transition: transform 0.15s ease;
    }

    .score-val.bump { transform: scale(1.18); }

    .next-row {
      display: flex;
      gap: 5px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .mini-ball {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .trophy-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 0 4px 6px;
      opacity: 0.8;
      transition: opacity 0.15s;
      line-height: 1;
    }

    .trophy-btn:hover { opacity: 1; }

    /* CANVAS WRAP */
    .game-wrap {
      position: relative;
      width: 100%;
      padding: 0 10px;
    }

    #canvas {
      display: block;
      width: 100%;
      border-radius: 10px;
      background: #1a1a1e;
      touch-action: none;
      cursor: pointer;
    }

    /* COMBO BADGE */
    .combo-badge {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%) scale(1);
      background: rgba(255, 149, 0, 0.14);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 149, 0, 0.35);
      color: var(--orange);
      font-size: 13px;
      font-weight: 700;
      padding: 5px 16px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 5;
    }

    .combo-badge.hidden {
      opacity: 0;
      transform: translateX(-50%) scale(0.85);
    }

    /* NEW GAME BTN */
    .btn-row {
      width: 100%;
      padding: 12px 16px;
    }

    .new-game-btn {
      width: 100%;
      padding: 14px;
      background: var(--surface2);
      color: var(--text);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .new-game-btn:hover { background: #2e2e32; }
    .new-game-btn:active { background: #383840; }

    /* OVERLAYS */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
      transition: opacity 0.25s;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .modal {
      background: var(--surface);
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.65);
      position: relative;
    }

    .modal-title {
      font-size: 38px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 4px;
    }

    .record-badge {
      display: inline-block;
      background: rgba(255,204,51,0.15);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
    }

    .final-score {
      font-size: 56px;
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      line-height: 1;
      margin-bottom: 20px;
    }

    .scores-table {
      background: var(--surface2);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 18px;
    }

    .score-row {
      display: flex;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 8px;
    }

    .score-row:last-child { border-bottom: none; }

    .rank-icon { font-size: 16px; width: 22px; flex-shrink: 0; text-align: center; }
    .rank-num { font-size: 13px; color: var(--text-dim); font-weight: 600; }
    .rank-val { margin-left: auto; font-size: 16px; font-weight: 700; }
    .rank-val.gold { color: var(--gold); }

    .play-btn {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: #111;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: filter 0.15s;
    }

    .play-btn:hover { filter: brightness(1.08); }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--surface2);
      border: none;
      color: var(--text-dim);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .close-btn:hover { background: #333338; color: var(--text); }

    .hs-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; }

    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 24px 0;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="page">
<header class="header">
  <a class="back-link" href="/BallLines/">← Home</a>
  <div class="hud">
    <div class="next-block">
      <div class="lbl">Next</div>
      <div class="next-row" id="next-row"></div>
    </div>
    <div class="score-block">
      <div class="lbl">Score</div>
      <div class="score-val" id="score-val">0</div>
    </div>
    <button class="trophy-btn" id="trophy-btn">🏆</button>
  </div>
</header>

<div class="game-wrap">
  <canvas id="canvas"></canvas>
  <div class="combo-badge hidden" id="combo-badge">🔥 Combo ×2</div>
</div>

<div class="btn-row">
  <button class="new-game-btn" id="new-game-btn">New Game</button>
</div>
</div><!-- end .page -->

<!-- Game Over -->
<div class="overlay hidden" id="gameover-overlay">
  <div class="modal">
    <div style="text-align:center;margin-bottom:10px">
      <div class="modal-title">Game Over</div>
      <div class="record-badge" id="record-badge" style="display:none">🎉 New Record!</div>
    </div>
    <div class="final-score" id="final-score">0</div>
    <div id="gameover-hs"></div>
    <button class="play-btn" id="play-again-btn">Play Again</button>
  </div>
</div>

<!-- High Scores -->
<div class="overlay hidden" id="hs-overlay">
  <div class="modal">
    <button class="close-btn" id="close-hs">✕</button>
    <div class="hs-title">🏆 Top Scores</div>
    <div id="hs-list"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const G = 9, BPT = 3, LL = 5, INIT = 5, STEP_MS = 20;

const COLORS = {
  red:    [235, 56,  56 ],
  orange: [255, 148, 26 ],
  yellow: [247, 224, 20 ],
  green:  [46,  196, 76 ],
  blue:   [51,  115, 242],
  purple: [173, 46,  229],
  pink:   [244, 97,  173],
};
const CKEYS = Object.keys(COLORS);
const WILD  = 'wild';

// ─────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────
const inB = (r, c) => r >= 0 && r < G && c >= 0 && c < G;

function randColor() {
  return Math.random() < 0.05 ? WILD : CKEYS[Math.floor(Math.random() * CKEYS.length)];
}
const randColors = (n = BPT) => Array.from({ length: n }, randColor);

function shuffle(a) {
  a = [...a];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function bfs(grid, s, e) {
  if (grid[e.r][e.c]) return null;
  const Q = [s], from = new Map(), vis = new Set([`${s.r},${s.c}`]);
  while (Q.length) {
    const cur = Q.shift();
    if (cur.r === e.r && cur.c === e.c) {
      const path = []; let n = e;
      while (n) { path.push(n); n = from.get(`${n.r},${n.c}`); }
      return path.reverse();
    }
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = cur.r+dr, nc = cur.c+dc, k = `${nr},${nc}`;
      if (!inB(nr,nc) || vis.has(k) || grid[nr][nc]) continue;
      vis.add(k); from.set(k, cur); Q.push({r:nr,c:nc});
    }
  }
  return null;
}

// ─────────────────────────────────────────
// GAME
// ─────────────────────────────────────────
class Game {
  constructor() { this.reset(); }

  reset() {
    this.grid  = Array.from({length:G}, () => Array(G).fill(null));
    this.score = 0; this.combo = 0;
    this.sel   = null; this.over = false; this.anim = false;
    this.mb    = null; // moving ball {color,r,c}
    this.next  = randColors();
    this._spawn(Array.from({length:INIT}, randColor), false);
    this.next  = randColors();
  }

  get empties() {
    const r = [];
    for (let row=0;row<G;row++) for(let col=0;col<G;col++) if(!this.grid[row][col]) r.push({r:row,c:col});
    return r;
  }

  tap(r, c) {
    if (this.over || this.anim) return null;
    if (this.sel) {
      const {r:sr,c:sc} = this.sel;
      if (sr===r && sc===c) { this.sel=null; return {type:'desel'}; }
      if (this.grid[r][c])  { this.sel={r,c}; return {type:'sel'}; }
      const path = bfs(this.grid, {r:sr,c:sc}, {r,c});
      if (!path) return null;
      this.sel = null;
      return {type:'move', from:{r:sr,c:sc}, to:{r,c}, path};
    }
    if (this.grid[r][c]) { this.sel={r,c}; return {type:'sel'}; }
    return null;
  }

  move(from, to, path, onStep, onDone) {
    const ball = this.grid[from.r][from.c];
    this.grid[from.r][from.c] = null;
    this.anim = true;
    this.mb = {color: ball.color, r: from.r, c: from.c};
    onStep();

    let i = 1;
    const step = () => {
      if (i >= path.length) {
        this.mb = null; this.anim = false;
        this.grid[to.r][to.c] = {color: ball.color};
        const cleared = this._lines(to);
        if (cleared) {
          this.combo++;
        } else {
          this.combo = 0;
          const cols = [...this.next];
          this.next = randColors();
          this._spawn(cols);
          if (!this.empties.length) this.over = true;
        }
        onStep(); onDone(cleared); return;
      }
      this.mb = {color: ball.color, r: path[i].r, c: path[i].c};
      i++; onStep();
      setTimeout(step, STEP_MS);
    };
    setTimeout(step, STEP_MS);
  }

  _spawn(colors, check=true) {
    const emp = shuffle(this.empties);
    const done = [];
    colors.forEach((col,i) => {
      if (i >= emp.length) return;
      const {r,c} = emp[i];
      this.grid[r][c] = {color:col}; done.push({r,c});
    });
    if (check) done.forEach(p => this._lines(p));
  }

  _lines(pos) {
    const cell = this.grid[pos.r][pos.c];
    if (!cell) return false;
    const targets = cell.color===WILD ? CKEYS : [cell.color];
    const remove = new Set();

    for (const tc of targets) {
      for (const [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
        const line = [pos];
        let r=pos.r+dr, c=pos.c+dc;
        while(inB(r,c)){ const x=this.grid[r][c]; if(!x||(x.color!==tc&&x.color!==WILD))break; line.push({r,c}); r+=dr;c+=dc; }
        r=pos.r-dr; c=pos.c-dc;
        while(inB(r,c)){ const x=this.grid[r][c]; if(!x||(x.color!==tc&&x.color!==WILD))break; line.push({r,c}); r-=dr;c-=dc; }
        if (line.length >= LL) line.forEach(p=>remove.add(`${p.r},${p.c}`));
      }
    }
    if (!remove.size) return false;
    const n = remove.size;
    this.score += (10 + this.combo*5) + (n-LL)*5;
    remove.forEach(k=>{ const[r,c]=k.split(',').map(Number); this.grid[r][c]=null; });
    return true;
  }
}

// ─────────────────────────────────────────
// HIGH SCORES
// ─────────────────────────────────────────
const HS_KEY = 'blv2_scores';
const loadHS = () => { try { return JSON.parse(localStorage.getItem(HS_KEY))||[]; } catch{return[];} };
const saveHS = s => {
  if (s<=0) return loadHS();
  const hs = [...loadHS(), s].sort((a,b)=>b-a).slice(0,5);
  localStorage.setItem(HS_KEY, JSON.stringify(hs)); return hs;
};

// ─────────────────────────────────────────
// RENDERER
// ─────────────────────────────────────────
class Renderer {
  constructor(cv) { this.cv=cv; this.ctx=cv.getContext('2d'); }
  get cs() { return this.cv.width/G; }

  draw(game) {
    const {ctx,cv} = this; const cs = this.cs;
    ctx.clearRect(0,0,cv.width,cv.height);
    this._grid(cs);

    for (let r=0;r<G;r++) for (let c=0;c<G;c++) {
      const cell=game.grid[r][c]; if(!cell) continue;
      const sel = game.sel && game.sel.r===r && game.sel.c===c;
      this._ball(c*cs+cs/2, r*cs+cs/2, cs*0.38*(sel?1.12:1.0), cell.color, sel);
    }

    if (game.mb) {
      const {color,r,c}=game.mb;
      this._ball(c*cs+cs/2, r*cs+cs/2, cs*0.38, color, false);
    }
  }

  _grid(cs) {
    const {ctx} = this; const sz = this.cv.width;
    for (let r=0;r<G;r++) for(let c=0;c<G;c++){
      ctx.fillStyle = (r+c)%2===0 ? '#232327' : '#27272b';
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(c*cs+.5,r*cs+.5,cs-1,cs-1,3);
      else ctx.rect(c*cs+.5,r*cs+.5,cs-1,cs-1);
      ctx.fill();
    }
    ctx.strokeStyle='#18181c'; ctx.lineWidth=1;
    for(let i=0;i<=G;i++){
      const p=i*cs;
      ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,sz);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(sz,p);ctx.stroke();
    }
  }

  _ball(x,y,rad,color,sel) {
    color===WILD ? this._wild(x,y,rad,sel) : this._normal(x,y,rad,color,sel);
  }

  _normal(x,y,rad,key,sel) {
    const {ctx}=this; const [r,g,b]=COLORS[key];
    const lr=Math.min(r+85,255),lg=Math.min(g+85,255),lb=Math.min(b+85,255);
    const dr=Math.max(r-65,0),dg=Math.max(g-65,0),db=Math.max(b-65,0);

    if(sel){
      const gw=ctx.createRadialGradient(x,y,0,x,y,rad*1.65);
      gw.addColorStop(0,`rgba(${r},${g},${b},.48)`);
      gw.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.beginPath();ctx.arc(x,y,rad*1.65,0,Math.PI*2);ctx.fillStyle=gw;ctx.fill();
    }

    // shadow
    ctx.beginPath();ctx.arc(x+1,y+3,rad*.94,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.38)';ctx.fill();

    // body
    const bg=ctx.createRadialGradient(x-rad*.3,y-rad*.3,rad*.05,x,y,rad);
    bg.addColorStop(0,`rgb(${lr},${lg},${lb})`);
    bg.addColorStop(.5,`rgb(${r},${g},${b})`);
    bg.addColorStop(1,`rgb(${dr},${dg},${db})`);
    ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();

    // selected edge
    if(sel){
      ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${lr},${lg},${lb},.9)`;ctx.lineWidth=2.5;ctx.stroke();
    }

    // specular
    const hl=ctx.createRadialGradient(x-rad*.25,y-rad*.28,0,x-rad*.25,y-rad*.28,rad*.45);
    hl.addColorStop(0,'rgba(255,255,255,.58)');hl.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fillStyle=hl;ctx.fill();
  }

  _wild(x,y,rad,sel) {
    const {ctx}=this;

    if(sel){
      const gw=ctx.createRadialGradient(x,y,0,x,y,rad*1.65);
      gw.addColorStop(0,'rgba(210,210,255,.42)');gw.addColorStop(1,'rgba(210,210,255,0)');
      ctx.beginPath();ctx.arc(x,y,rad*1.65,0,Math.PI*2);ctx.fillStyle=gw;ctx.fill();
    }

    ctx.beginPath();ctx.arc(x+1,y+3,rad*.94,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.22)';ctx.fill();

    const bg=ctx.createRadialGradient(x-rad*.3,y-rad*.3,rad*.05,x,y,rad);
    bg.addColorStop(0,'rgb(255,255,255)');
    bg.addColorStop(.6,'rgb(224,224,234)');
    bg.addColorStop(1,'rgb(182,182,198)');
    ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();

    ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);
    ctx.strokeStyle=sel?'rgba(185,185,220,.9)':'rgba(155,155,175,.35)';
    ctx.lineWidth=sel?2.5:.5;ctx.stroke();

    const hl=ctx.createRadialGradient(x-rad*.25,y-rad*.28,0,x-rad*.25,y-rad*.28,rad*.42);
    hl.addColorStop(0,'rgba(255,255,255,.85)');hl.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fillStyle=hl;ctx.fill();
  }
}

// ─────────────────────────────────────────
// MINI BALL CSS (for next-row preview)
// ─────────────────────────────────────────
function ballGradientCSS(color) {
  if (color===WILD)
    return 'radial-gradient(circle at 35% 30%,#fff 0%,#e0e0ea 55%,#b6b6c4 100%)';
  const [r,g,b]=COLORS[color];
  return `radial-gradient(circle at 35% 30%,rgb(${Math.min(r+85,255)},${Math.min(g+85,255)},${Math.min(b+85,255)}) 0%,rgb(${r},${g},${b}) 50%,rgb(${Math.max(r-65,0)},${Math.max(g-65,0)},${Math.max(b-65,0)}) 100%)`;
}

// ─────────────────────────────────────────
// SCORE ROWS HTML
// ─────────────────────────────────────────
const MEDALS = ['🥇','🥈','🥉','',''];
function scoreRowsHTML(scores) {
  if (!scores.length) return '<div class="empty-state">No scores yet.<br>Play to get on the board!</div>';
  return scores.map((s,i)=>`
    <div class="score-row">
      <span class="rank-icon">${MEDALS[i]||''}</span>
      <span class="rank-num">#${i+1}</span>
      <span class="rank-val ${i===0?'gold':''}">${s}</span>
    </div>`).join('');
}

// ─────────────────────────────────────────
// MAIN
// ─────────────────────────────────────────
const cv  = document.getElementById('canvas');
const game = new Game();
const ren  = new Renderer(cv);

function resize() {
  const maxW = cv.parentElement.clientWidth - 20;
  const maxH = window.innerHeight - 170; // leave room for header + button
  const w = Math.min(maxW, maxH);
  cv.width = w; cv.height = w;
  ren.draw(game);
}

function refresh() {
  ren.draw(game);
  document.getElementById('score-val').textContent = game.score;

  const row = document.getElementById('next-row');
  row.innerHTML = '';
  game.next.forEach(col => {
    const d = document.createElement('div');
    d.className = 'mini-ball';
    d.style.background = ballGradientCSS(col);
    if (col===WILD) d.style.border = '1px solid rgba(150,150,175,.4)';
    row.appendChild(d);
  });
}

// Combo badge
let comboTimer = null;
function showCombo(count) {
  const el = document.getElementById('combo-badge');
  if (count < 2) { el.classList.add('hidden'); return; }
  el.textContent = `🔥 Combo ×${count}  +${10 + count*5}`;
  el.classList.remove('hidden');
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => el.classList.add('hidden'), 1500);
}

// Score bump
function bumpScore() {
  const el = document.getElementById('score-val');
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}

// Handle tap/click
function handleTap(cx, cy) {
  const rect = cv.getBoundingClientRect();
  const sx = cv.width  / rect.width;
  const sy = cv.height / rect.height;
  const x  = (cx - rect.left) * sx;
  const y  = (cy - rect.top)  * sy;
  const cs = cv.width / G;
  const col = Math.floor(x / cs);
  const row = Math.floor(y / cs);
  if (!inB(row, col)) return;

  const res = game.tap(row, col);
  if (!res) return;

  if (res.type === 'move') {
    game.move(res.from, res.to, res.path,
      () => refresh(),
      (cleared) => {
        if (cleared) { bumpScore(); showCombo(game.combo); }
        refresh();
        if (game.over) {
          const hs = saveHS(game.score);
          setTimeout(() => {
            const isNew = hs[0]===game.score && game.score>0;
            document.getElementById('record-badge').style.display = isNew?'inline-block':'none';
            document.getElementById('final-score').textContent = game.score;
            document.getElementById('gameover-hs').innerHTML =
              `<div class="scores-table">${scoreRowsHTML(hs)}</div>`;
            document.getElementById('gameover-overlay').classList.remove('hidden');
          }, 350);
        }
      }
    );
  } else {
    refresh();
  }
}

cv.addEventListener('click', e => handleTap(e.clientX, e.clientY));
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  handleTap(t.clientX, t.clientY);
}, { passive: false });

document.getElementById('new-game-btn').addEventListener('click', () => {
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('combo-badge').classList.add('hidden');
  game.reset(); refresh();
});

document.getElementById('play-again-btn').addEventListener('click', () => {
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('combo-badge').classList.add('hidden');
  game.reset(); refresh();
});

document.getElementById('trophy-btn').addEventListener('click', () => {
  document.getElementById('hs-list').innerHTML = scoreRowsHTML(loadHS());
  document.getElementById('hs-overlay').classList.remove('hidden');
});

document.getElementById('close-hs').addEventListener('click', () =>
  document.getElementById('hs-overlay').classList.add('hidden'));

document.getElementById('hs-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('hs-overlay'))
    document.getElementById('hs-overlay').classList.add('hidden');
});

window.addEventListener('resize', resize);
resize();
refresh();
</script>
